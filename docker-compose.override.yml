# Dev-окружение. docker-compose автоматически подхватывает этот файл поверх
# docker-compose.yml при обычном `docker compose up`.
#
#   Запуск разработки:   docker compose up --build
#   Запуск как в проде:  docker compose -f docker-compose.yml up --build
#
# Сервисы:
#   app  — php artisan serve (бэкенд + Inertia)  -> http://localhost:8000
#   vite — Vite dev-server с HMR                  -> порт 5173

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: kurs-app-dev
    container_name: kurs-app-dev
    restart: unless-stopped
    entrypoint: ["sh", "/var/www/html/docker/entrypoint.dev.sh"]
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    ports:
      - "8000:8000"   # Laravel (artisan serve)
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
    volumes:
      # Монтируем исходники для мгновенного отражения изменений
      - .:/var/www/html
      # vendor и node_modules держим в томах, чтобы хостовые не перетирали контейнерные
      - dev-vendor:/var/www/html/vendor
      - dev-node-modules:/var/www/html/node_modules
    # Healthcheck из прод-файла тут не нужен
    healthcheck:
      disable: true

  vite:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: kurs-app-dev
    container_name: kurs-vite-dev
    restart: unless-stopped
    depends_on:
      - app
    # vendor ставит сервис app — здесь только ждём готовности (Ziggy нужен Vite),
    # ставим npm-зависимости при необходимости и запускаем Vite.
    command: >
      sh -c "echo 'Жду установки vendor сервисом app...';
             while [ -z \"$$(ls -A vendor 2>/dev/null)\" ]; do sleep 2; done;
             [ -n \"$$(ls -A node_modules 2>/dev/null)\" ] || npm install;
             npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"   # Vite dev-server (HMR)
    volumes:
      - .:/var/www/html
      - dev-vendor:/var/www/html/vendor
      - dev-node-modules:/var/www/html/node_modules

volumes:
  dev-vendor:
  dev-node-modules:
