services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kurs-app
    container_name: kurs-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      # Фиксированный ключ — чтобы сессии (и шифрованные данные) переживали
      # пересоздание контейнера. Значение берётся из .env рядом с compose.
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      # Настройки AI (OpenRouter). Тоже из .env рядом с compose.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-z-ai/glm-4.5-air:free}
    volumes:
      # Сохраняем БД SQLite, загруженные файлы и логи между перезапусками
      - app-database:/var/www/html/database
      - app-storage:/var/www/html/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  app-database:
  app-storage:
