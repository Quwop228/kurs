services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kurs-app
    container_name: kurs-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
    volumes:
      # Сохраняем БД SQLite, загруженные файлы и логи между перезапусками
      - app-database:/var/www/html/database
      - app-storage:/var/www/html/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  app-database:
  app-storage:
